name: Auto Version & Push Docker Image (No latest)

on:
  push:
    branches:
      - main

permissions:
  contents: write  # 需要推 tag

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 確保能取得所有 tag

      # 1) 自動計算下一個 semver 版本
      - name: Get next version
        uses: reecetech/version-increment@2024.10.1
        id: version
        with:
          scheme: semver
          increment: patch
          prefix: 'v'

      - name: Set VERSION env
        run: echo "VERSION=${{ steps.version.outputs.v-version }}" >> $GITHUB_ENV

      # 2) 設定 Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3) Docker Hub 登入
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4) Build 並推 image（只有版本 tag）
      - name: Build & Push image (version only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ env.VERSION }}

      # 5) Push git tag
      - name: Push new Git tag
        run: |
          git tag ${{ env.VERSION }}
          git push origin ${{ env.VERSION }}